# .cargo/config.toml
# =====================
# Intel Iris Xe Optimization Build Config
#
# Iris Xe is an integrated GPU on 11th/12th Gen Intel Core (Tiger Lake, Alder Lake).
# The HOST CPU on these chips supports AVX2 natively.
#
# -C target-cpu=native:
#   Tells rustc to detect the exact CPU at compile time and enable
#   every instruction set it supports — AVX2, FMA, POPCNT, BMI2, etc.
#   This unlocks auto-vectorization at 256-bit width (8x f32 per cycle)
#   for all the tight loops in neurons.rs and synapses.rs.
#
# -C opt-level=3:
#   Maximum optimization. Enables loop unrolling, vectorization, inlining.
#
# WARNING: Binary will NOT run on CPUs older than the build machine.
# For distribution, remove target-cpu=native and pin to target-cpu=haswell (AVX2 baseline).

[build]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "opt-level=3",
    "-C", "force-frame-pointers=no",
]

# Bake in the venv interpreter so `cargo build` / `cargo run` link against the
# correct libpython without needing `source .env` first. build.rs requires this
# and panics if it's missing/wrong. NOT a secret (just a path), so it's safe in
# this tracked file. Cargo does NOT override a var already in the environment,
# so an explicit `source .env` still wins. The API key stays OUT of here — it
# lives only in the gitignored .env and is loaded at runtime by main.rs.
[env]
PYO3_PYTHON = "/home/nodevortex/Nova_Simona_Core/.venv-3.11/bin/python"

# Convenience: `cargo start` == optimized run with everything wired in.
# (Plain `cargo run` also works — the binary self-loads .env at startup and
# PYO3_PYTHON above satisfies the build, so no `source .env` is ever needed.)
[alias]
start = "run --release"
